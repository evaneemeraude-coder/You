<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>💖 Pour Ketsia 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(135deg, #0b0b2a, #1a0b2e, #2a0b3d);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.container {
    text-align: center;
}

h1 {
    font-size: 2.2rem;
    margin-bottom: 40px;
}

.buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    font-size: 1rem;
    cursor: pointer;
}

#yes {
    background: #ff4da6;
    color: white;
}

#no {
    background: #444;
    color: white;
    position: absolute;
}

#cinematic {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.92);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px;
    text-align: center;
}

#text {
    max-width: 700px;
    font-size: 1.2rem;
    line-height: 1.8;
    white-space: pre-line;
}

</style>
</head>

<body>

<div class="container">
    <h1>💖 Veux-tu sortir avec moi Ketsia ? 💖</h1>

    <div class="buttons">
        <button id="yes">Oui 💖</button>
        <button id="no">Non</button>
    </div>
</div>

<div id="cinematic">
    <div id="text"></div>
</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const cinematic = document.getElementById("cinematic");
const text = document.getElementById("text");
const container = document.querySelector(".container");

const messages = [
    "🥺 Tu vas vraiment dire non ?",
    "😭 Réfléchis encore...",
    "❤️ Sérieux ?",
    "🕷️ Même Miles dirait oui !",
    "💕 Dernière chance ?"
];

// bouton NON qui fuit
noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    noBtn.innerText = messages[Math.floor(Math.random() * messages.length)];
});

let yesClicks = 0;
let i = 0;
let started = false;

const story = `Ketsia...

Il paraît qu'il existe une infinité d'univers.

Mais dans celui-ci, je veux être avec toi.

Je t'aime.`;

yesBtn.addEventListener("click", () => {
    yesClicks++;

    if (yesClicks === 1) {
        yesBtn.innerText = "Tu es sûr ? 💭";
        return;
    }

    if (yesClicks === 2) {

        if (started) return;
        started = true;

        container.style.display = "none";
        cinematic.style.display = "flex";

        text.innerHTML = "";
        i = 0;

        typeWriter();
    }
});

function typeWriter() {
    if (i < story.length) {
        text.innerHTML += story.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
    }
}
</script>

</body>
</html>
